<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigWebStore - إدارة التصنيفات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <header class="admin-header">
        <div class="admin-header-container">
            <div class="admin-brand">
                <div class="logo-circle small"><span>BS</span></div>
                <span>لوحة الإدارة</span>
            </div>
            <nav class="admin-nav">
                <a href="admin-dashboard.html">لوحة التحكم</a>
                <a href="admin-categories.html" class="active">إدارة التصنيفات</a>
                <a href="admin-descriptions.html">أوصاف المنتجات</a>
                <a href="admin-settings.html">الإعدادات</a>
                <a href="index.html">عرض المتجر</a>
            </nav>
            <button class="logout-btn" id="logoutBtn">خروج</button>
        </div>
    </header>

    <main class="admin-main">
        <h1 class="admin-title">إدارة التصنيفات</h1>
        <p class="admin-subtitle muted">
            اختر التصنيفات التي تريد إخفاءها من واجهة الزبون. التصنيفات المخفية لن
            تظهر للزبون ولن يستطيع تصفح منتجاتها.
        </p>

        <div class="admin-toolbar">
            <input type="text" id="catSearch" class="admin-input" placeholder="ابحث عن تصنيف...">
            <button class="ghost-btn" id="showAllBtn">إظهار الكل</button>
            <button class="ghost-btn" id="hideAllBtn">إخفاء الكل</button>
        </div>

        <div class="admin-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>المعرف</th>
                        <th>اسم التصنيف</th>
                        <th>الحالة</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="categoriesTableBody">
                    <!-- Filled by admin.js -->
                </tbody>
            </table>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
