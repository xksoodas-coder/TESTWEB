<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنصّة — المتاجر</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background: #f4f5f7; color: #222; }
        header { background: #1f2937; color: #fff; padding: 16px 22px; font-size: 18px; font-weight: 700; }
        main { max-width: 1000px; margin: 0 auto; padding: 22px; }
        .card { background: #fff; border: 1px solid #e3e3e3; border-radius: 12px; padding: 18px; margin-bottom: 18px; }
        h2 { margin: 0 0 14px; font-size: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; margin: 8px 0 4px; color: #444; }
        input, select { width: 100%; padding: 9px 11px; border: 1px solid #bbb; border-radius: 8px; font-size: 14px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 700; cursor: pointer; font-size: 14px; }
        .btn.gray { background: #6b7280; }
        .btn.red { background: #dc2626; padding: 6px 12px; font-size: 13px; }
        .btn.green { background: #16a34a; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: right; padding: 9px 8px; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: 700; }
        .pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .on { background: #dcfce7; color: #166534; }
        .off { background: #fee2e2; color: #991b1b; }
        .muted { color: #888; font-size: 12px; }
        .err { color: #dc2626; font-size: 13px; margin-top: 8px; }
        .ok { color: #16a34a; font-size: 13px; margin-top: 8px; }
        code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <header>🏬 إدارة المنصّة — متاجر الزبائن</header>
    <main>
        <!-- Platform key -->
        <div class="card" id="keyCard">
            <h2>مفتاح المنصّة</h2>
            <p class="muted">أدخل <code>BWS_PLATFORM_ADMIN_KEY</code> للوصول إلى الإدارة.</p>
            <input type="password" id="platformKey" placeholder="مفتاح المنصّة">
            <div style="margin-top:12px"><button class="btn" id="keyBtn">دخول</button></div>
            <div class="err" id="keyErr" hidden></div>
        </div>

        <div id="panel" hidden>
            <!-- Create / update -->
            <div class="card">
                <h2>إنشاء / تعديل متجر</h2>
                <div class="row">
                    <div>
                        <label>Store ID (رمز المتجر — نفسه في كل الجداول)</label>
                        <input id="fStoreId" placeholder="مثال: AAA">
                    </div>
                    <div>
                        <label>Slug (للرابط: slug.الدومين أو ?store=slug)</label>
                        <input id="fSlug" placeholder="مثال: boutique-ali">
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>اسم المتجر (للعرض)</label>
                        <input id="fName" placeholder="بوتيك علي">
                    </div>
                    <div>
                        <label>دومين خاص (اختياري)</label>
                        <input id="fDomain" placeholder="www.boutique-ali.com">
                    </div>
                </div>
                <div class="row">
                    <div>
                        <label>الحالة</label>
                        <select id="fActive">
                            <option value="1">مُفعّل</option>
                            <option value="0">مُعطّل</option>
                        </select>
                    </div>
                    <div style="display:flex;align-items:flex-end">
                        <button class="btn green" id="saveBtn" style="width:100%">حفظ المتجر</button>
                    </div>
                </div>
                <div class="err" id="saveErr" hidden></div>
                <div class="ok" id="saveOk" hidden></div>
            </div>

            <!-- List -->
            <div class="card">
                <h2>المتاجر <button class="btn gray" id="reloadBtn" style="float:left;padding:6px 14px;font-size:13px">تحديث</button></h2>
                <table>
                    <thead>
                        <tr><th>الاسم</th><th>Store ID</th><th>Slug</th><th>دومين خاص</th><th>الحالة</th><th></th></tr>
                    </thead>
                    <tbody id="tbody">
                        <tr><td colspan="6" class="muted">—</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const LS_KEY = 'bws_platform_key';
        let KEY = localStorage.getItem(LS_KEY) || '';

        function api(method, body) {
            return fetch('/api/tenants', {
                method,
                headers: { 'Content-Type': 'application/json', 'x-platform-key': KEY },
                body: body ? JSON.stringify(body) : undefined
            }).then(async r => {
                const j = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
                return j;
            });
        }

        function show(el, msg) { el.textContent = msg; el.hidden = false; }
        function hide(el) { el.hidden = true; }

        async function loadTenants() {
            const tbody = document.getElementById('tbody');
            try {
                const { tenants } = await api('GET');
                if (!tenants.length) { tbody.innerHTML = '<tr><td colspan="6" class="muted">لا توجد متاجر بعد</td></tr>'; return; }
                tbody.innerHTML = tenants.map(t => `
                    <tr>
                        <td>${esc(t.displayName) || '—'}</td>
                        <td><code>${esc(t.storeId)}</code></td>
                        <td>${esc(t.slug)}</td>
                        <td>${esc(t.customDomain) || '<span class="muted">—</span>'}</td>
                        <td><span class="pill ${t.isActive ? 'on' : 'off'}">${t.isActive ? 'مُفعّل' : 'مُعطّل'}</span></td>
                        <td>
                            <button class="btn gray" style="padding:6px 12px;font-size:13px" data-edit='${esc(JSON.stringify(t))}'>تعديل</button>
                            <button class="btn red" data-del="${esc(t.storeId)}">حذف</button>
                        </td>
                    </tr>`).join('');
                tbody.querySelectorAll('[data-del]').forEach(b => b.onclick = () => delTenant(b.dataset.del));
                tbody.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => fillForm(JSON.parse(b.dataset.edit)));
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="6" class="err">${esc(e.message)}</td></tr>`;
            }
        }

        function fillForm(t) {
            document.getElementById('fStoreId').value = t.storeId || '';
            document.getElementById('fSlug').value = t.slug || '';
            document.getElementById('fName').value = t.displayName || '';
            document.getElementById('fDomain').value = t.customDomain || '';
            document.getElementById('fActive').value = t.isActive ? '1' : '0';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function delTenant(storeId) {
            if (!confirm('حذف هذا المتجر من السجل؟ (لا يحذف بياناته، فقط الرابط)')) return;
            try { await api('DELETE', { storeId }); loadTenants(); }
            catch (e) { alert(e.message); }
        }

        document.getElementById('saveBtn').onclick = async () => {
            const errEl = document.getElementById('saveErr'), okEl = document.getElementById('saveOk');
            hide(errEl); hide(okEl);
            const body = {
                storeId: document.getElementById('fStoreId').value.trim(),
                slug: document.getElementById('fSlug').value.trim(),
                displayName: document.getElementById('fName').value.trim(),
                customDomain: document.getElementById('fDomain').value.trim(),
                isActive: document.getElementById('fActive').value === '1'
            };
            try { await api('POST', body); show(okEl, 'تم الحفظ ✅'); loadTenants(); }
            catch (e) { show(errEl, e.message); }
        };

        document.getElementById('reloadBtn').onclick = loadTenants;

        document.getElementById('keyBtn').onclick = async () => {
            KEY = document.getElementById('platformKey').value.trim();
            try {
                await api('GET');
                localStorage.setItem(LS_KEY, KEY);
                document.getElementById('keyCard').hidden = true;
                document.getElementById('panel').hidden = false;
                loadTenants();
            } catch (e) {
                show(document.getElementById('keyErr'), e.message);
            }
        };

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Auto-enter if a key was saved.
        if (KEY) {
            document.getElementById('platformKey').value = KEY;
            api('GET').then(() => {
                document.getElementById('keyCard').hidden = true;
                document.getElementById('panel').hidden = false;
                loadTenants();
            }).catch(() => { /* show key card */ });
        }
    </script>
</body>
</html>
